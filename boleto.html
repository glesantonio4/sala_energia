<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Boleto Ganador · MUCH</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --ink: #0b1220;
      --muted: #64748b;
      --turquesa: #06b6d4;
      --fucsia: #d946ef;
      --paper: #ffffff;
      --paper-line: #e5e7eb;
      --chip-bg: #ecfeff;
      --chip-ink: #075985;
      --whatsapp: #25D366;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    img {
      max-width: 100%;
      height: auto;
      display: block;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background: radial-gradient(1200px 800px at 20% 20%, rgba(255, 255, 255, .5), transparent 60%), linear-gradient(135deg, #0ea5b9, #ec4899, #38bdf8, #f472b6);
      background-size: 200% 200%;
      animation: bgmove 24s ease-in-out infinite;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    @keyframes bgmove {
      0% {
        background-position: 0% 50%
      }

      50% {
        background-position: 100% 50%
      }

      100% {
        background-position: 0% 50%
      }
    }

    .ticket-shell {
      width: 100%;
      max-width: 600px;
      margin-inline: auto;
    }

    .ticket-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(2, 6, 23, .15);
      border: 1px solid rgba(255, 255, 255, .4);
      padding: 10px;
    }

    .ticket-paper {
      border: 2px dashed var(--paper-line);
      border-radius: 12px;
      padding: 16px 12px;
      position: relative;
      background: #fff;
      overflow: hidden;
    }

    .ticket-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      border-bottom: 1px solid #f1f5f9;
      padding: 8px 8px 14px;
    }

    .logo-box {
      width: 80px;
      height: 80px;
      min-width: 80px;
      flex-shrink: 0;
      background: #fff;
      border: 1px solid #eef2ff;
      border-radius: 10px;
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ticket-logo {
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
    }

    .center {
      flex: 1;
      text-align: center;
      min-width: 0;
    }

    .ticket-title {
      font-weight: 800;
      color: var(--fucsia);
      font-size: 1.1rem;
      margin: 0;
      line-height: 1.1;
    }

    .folio {
      display: inline-block;
      background: var(--chip-bg);
      color: var(--chip-ink);
      font-weight: 700;
      font-size: 0.75rem;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #bae6fd;
      margin-top: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .rows {
      margin-top: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0 16px;
    }

    .row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 8px 0;
      border-bottom: 1px dashed #eef2ff;
    }

    .row-full {
      grid-column: 1 / -1;
    }

    .label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .value {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
    }

    .qr-section {
      display: flex;
      justify-content: center;
      margin: 20px 0 10px;
    }

    #qrcode {
      padding: 8px;
      background: white;
      border: 2px solid #e5e7eb;
      border-radius: 12px;
    }

    .qr-hint {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .note {
      background: #f8fafc;
      border: 1px dashed #cbd5e1;
      padding: 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      text-align: center;
      color: #475569;
      margin-bottom: 16px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-direction: column;
      margin-top: 20px;
    }

    .btn {
      appearance: none;
      border: 0;
      cursor: pointer;
      border-radius: 10px;
      padding: 14px;
      font-weight: 700;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      text-decoration: none;
      width: 100%;
      text-align: center;
    }

    .btn-print {
      background: var(--turquesa);
      color: #fff;
    }

    .btn-link {
      background: #fff;
      color: #0f172a;
      border: 2px solid #e2e8f0;
    }

    .btn-whatsapp {
      background: var(--whatsapp);
      color: #fff;
      box-shadow: 0 4px 10px rgba(37, 211, 102, 0.3);
    }

    @media (min-width: 600px) {
      .actions {
        flex-direction: row;
      }

      .btn {
        width: auto;
        flex: 1;
      }
    }

    @media print {
      .actions {
        display: none;
      }

      .ticket-paper {
        border: 2px solid #000;
      }

      body {
        background: white;
      }
    }
  </style>
</head>

<body>
  <div class="ticket-shell">
    <div class="ticket-card" id="boletoCaptura">
      <div class="ticket-paper">
        <div class="ticket-head">
          <div class="logo-box"><img class="ticket-logo" src="logo-sata.png" alt="SATA" crossorigin="anonymous"
              onerror="this.parentElement.style.display='none'"></div>
          <div class="center">
            <h2 id="tTitle" class="ticket-title">MUCH · Premio</h2>
            <div id="tFolio" class="folio">Cargando...</div>
          </div>
          <div class="logo-box"><img class="ticket-logo" src="logo-much.png" alt="MUCH" crossorigin="anonymous"
              onerror="this.parentElement.style.display='none'"></div>
        </div>

        <div class="rows">
          <div class="row row-full">
            <div class="label">Beneficiario:</div>
            <div id="tNombre" class="value">—</div>
          </div>
          <div class="row">
            <div class="label">Acceso:</div>
            <div id="tPremio" class="value">—</div>
          </div>
          <div class="row">
            <div class="label">Vigencia:</div>
            <div id="tFecha" class="value">—</div>
          </div>
          <div class="row">
            <div class="label">Ubicación:</div>
            <div id="tLugar" class="value">MUCH</div>
          </div>
          <div class="row">
            <div class="label">Teléfono:</div>
            <div id="tTel" class="value">—</div>
          </div>
          <div class="row row-full">
            <div class="label">Correo:</div>
            <div id="tCorreo" class="value" style="word-break: break-all;">—</div>
          </div>
        </div>

        <div class="qr-section">
          <div id="qrcode"></div>
        </div>
        <p class="qr-hint">Presenta este código al personal para validar</p>

        <div class="note">⚠️ Válido por una sola entrada. Sujeto a disponibilidad y horarios del museo.</div>
      </div>
    </div>

    <div class="actions">
      <button id="btnShareImage" class="btn btn-whatsapp">📤 Compartir Boleto (Imagen)</button>
      <button class="btn btn-print" onclick="window.print()">🖨️ Imprimir</button>
      <a class="btn btn-link" href="index.html">🏠 Inicio</a>
    </div>
  </div>

  <script>
    (function () {
      const qs = new URLSearchParams(location.search);
      const el = (id) => document.getElementById(id);
      const hoy = new Date(); const fin = new Date(hoy); fin.setDate(hoy.getDate() + 7);
      const fmt = new Intl.DateTimeFormat('es-MX', { dateStyle: 'medium' });

      el('tTitle').textContent = qs.get('titulo') || 'MUCH · Premio';
      el('tFolio').textContent = qs.get('folio') || 'Folio: ...';
      el('tNombre').textContent = qs.get('nombre') || '—';
      el('tPremio').textContent = qs.get('titulo') || 'Visita General(Museo + Planetario)'; // Usar el título dinámico
      el('tFecha').textContent = `${fmt.format(hoy)} al ${fmt.format(fin)}`;
      el('tLugar').innerHTML = qs.get('ubicacion') || 'Museo Chiapas'; // Usar la ubicación dinámica
      el('tCorreo').textContent = qs.get('correo') || '—';
      el('tTel').textContent = qs.get('telefono') || '—';
    })();
  </script>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      // 1. GENERAR QR
      const params = new URLSearchParams(window.location.search);
      const container = document.getElementById("qrcode");

      // Buscamos 'folio' (que es lo que manda registro.html) o 'ticket' como respaldo
      const folio = params.get('folio') || params.get('ticket');

      if (folio && container) {
        // Detectamos si es local o producción para crear el link correcto
        const isLocal = window.location.href.includes('localhost') || window.location.href.includes('127.0.0.1');

        // AJUSTA '/entrada-much' si tu carpeta local tiene otro nombre
        const baseUrl = isLocal
          ? window.location.origin + '/entrada-much'
          : 'https://glesantonio4.github.io/entrada-much';

        // Link final que leerá el guardia
        const validationUrl = `${baseUrl}/validar.html?folio=${folio}`;

        console.log("QR apunta a:", validationUrl); // Debug

        container.innerHTML = '';
        new QRCode(container, {
          text: validationUrl,
          width: 128,
          height: 128,
          colorDark: "#000000",
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.M
        });
      } else {
        container.innerHTML = '<span style="font-size:0.75rem;color:#94a3b8;">Código no disponible</span>';
      }

      // 2. COMPARTIR IMAGEN (Lógica intacta)
      const btnShare = document.getElementById('btnShareImage');
      if (btnShare) {
        btnShare.addEventListener('click', async () => {
          const originalText = btnShare.textContent;
          btnShare.textContent = 'Generando... 📸';
          btnShare.disabled = true;
          try {
            const element = document.getElementById('boletoCaptura');

            // ── Forzar ancho fijo para que la captura salga "cuadradita" ──
            const origWidth = element.style.width;
            const origMaxW = element.style.maxWidth;
            element.style.width = '600px';
            element.style.maxWidth = '600px';

            const canvas = await html2canvas(element, {
              scale: 3,
              backgroundColor: '#ffffff',
              useCORS: true,
              windowWidth: 600
            });

            // ── Restaurar estilos originales ──
            element.style.width = origWidth;
            element.style.maxWidth = origMaxW;

            canvas.toBlob(async (blob) => {
              const fileName = `Boleto_MUCH_${folio || Date.now()}.png`;
              const file = new File([blob], fileName, { type: "image/png" });

              // Intento de compartir nativo (celular)
              if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
                try {
                  await navigator.share({ files: [file], title: 'Mi Boleto MUCH', text: '¡Gané una entrada!' });
                  btnShare.textContent = '¡Enviado!';
                } catch (err) { downloadImage(blob, fileName); }
              } else {
                // Descarga en PC
                downloadImage(blob, fileName);
                alert("Imagen descargada. Compártela manualmente.");
              }
              setTimeout(() => { btnShare.textContent = originalText; btnShare.disabled = false; }, 2000);
            }, 'image/png');
          } catch (err) {
            console.error(err); alert("Error al crear imagen.");
            btnShare.textContent = originalText; btnShare.disabled = false;
          }
        });
      }

      function downloadImage(blob, fileName) {
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = fileName || 'Boleto_MUCH.png'; document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }
    });
  </script>
</body>

</html>
